{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "irrigator.fullname" . }}-manager-role
  labels:
    {{- include "irrigator.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - mqtt.hauke.cloud
  resources:
  - devices
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - mqtt.hauke.cloud
  resources:
  - mqttbridges
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - mqtt.hauke.cloud
  resources:
  - schedules
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - mqtt.hauke.cloud
  resources:
  - schedules/finalizers
  verbs:
  - update
- apiGroups:
  - mqtt.hauke.cloud
  resources:
  - schedules/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - customresourcedefinitions
  verbs:
  - create
  - get
  - list
  - update
  - patch
{{- with .Values.rbac.rules }}
{{ toYaml . }}
{{- end }}
{{- end }}

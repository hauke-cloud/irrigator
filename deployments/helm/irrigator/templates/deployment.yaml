apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "irrigator.fullname" . }}
  labels:
    {{- include "irrigator.labels" . | nindent 4 }}
    control-plane: controller-manager
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "irrigator.selectorLabels" . | nindent 6 }}
      control-plane: controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "irrigator.selectorLabels" . | nindent 8 }}
        control-plane: controller-manager
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "irrigator.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: manager
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command:
          - /manager
        args:
          {{- if .Values.operator.leaderElection }}
          - --leader-elect
          {{- end }}
          - --health-probe-bind-address=:{{ .Values.operator.health.port }}
          {{- if not .Values.operator.installCRDs }}
          - --install-crds=false
          {{- end }}
          {{- if .Values.sensorExporterAPI.url }}
          - --alerts-api-url={{ .Values.sensorExporterAPI.url }}
          {{- end }}
          {{- if .Values.sensorExporterAPI.certPath }}
          - --alerts-cert-path={{ .Values.sensorExporterAPI.certPath }}
          {{- end }}
          {{- if .Values.sensorExporterAPI.certFile }}
          - --alerts-cert-name={{ .Values.sensorExporterAPI.certFile }}
          {{- end }}
          {{- if .Values.sensorExporterAPI.keyFile }}
          - --alerts-cert-key={{ .Values.sensorExporterAPI.keyFile }}
          {{- end }}
          {{- if .Values.sensorExporterAPI.caFile }}
          - --alerts-ca-name={{ .Values.sensorExporterAPI.caFile }}
          {{- end }}
        ports:
        {{- if .Values.operator.metrics.enabled }}
        - containerPort: {{ .Values.operator.metrics.port }}
          name: metrics
          protocol: TCP
        {{- end }}
        - containerPort: {{ .Values.operator.health.port }}
          name: health
          protocol: TCP
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
        {{- if .Values.sensorExporterAPI.secretName }}
        volumeMounts:
        - name: sensor-exporter-certs
          mountPath: {{ .Values.sensorExporterAPI.certPath }}
          readOnly: true
        {{- end }}
        env:
        - name: LOG_LEVEL
          value: {{ .Values.logging.level | quote }}
        - name: LOG_FORMAT
          value: {{ .Values.logging.format | quote }}
      {{- if .Values.sensorExporterAPI.secretName }}
      volumes:
      - name: sensor-exporter-certs
        secret:
          secretName: {{ .Values.sensorExporterAPI.secretName }}
          defaultMode: 0400
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 10

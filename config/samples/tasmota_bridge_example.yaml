# Example: Tasmota as Zigbee Bridge with Multiple Topics
# 
# This example shows how to configure a single MQTTBridge with separate
# stateTopics and sensorTopics for better separation of concerns.
# - stateTopics are used by mqtt-device-manager for device control
# - sensorTopics are used by mqtt-sensor-exporter for metrics collection

---
apiVersion: v1
kind: Secret
metadata:
  name: mqtt-credentials
  namespace: default
type: Opaque
stringData:
  username: "mqtt-user"
  password: "mqtt-password"

---
# Single bridge with separate state and sensor topic subscriptions
apiVersion: mqtt.hauke.cloud/v1alpha1
kind: MQTTBridge
metadata:
  name: tasmota-zigbee-bridge
  namespace: default
spec:
  host: "mqtt.local"
  port: 1883
  credentialsSecretRef:
    name: mqtt-credentials
  
  deviceType: "tasmota"
  bridgeName: "tasmota_bridge_1"
  
  # State topics - used by mqtt-device-manager for device control
  # These contain command responses, state updates, and device information
  stateTopics:
    - topic: "stat/tasmota_bridge_1/RESULT"
      type: "status"
      qos: 0
    - topic: "tele/tasmota_bridge_1/STATE"
      type: "state"
      qos: 0
    - topic: "tele/tasmota_bridge_1/INFO1"
      type: "info"
      qos: 0
  
  # Sensor topics - used by mqtt-sensor-exporter for metrics
  # These contain telemetry and sensor data from Zigbee devices
  sensorTopics:
    - topic: "tele/tasmota_bridge_1/SENSOR"
      type: "telemetry"
      qos: 0
  
  discoveryEnabled: true
  clientId: "irrigator-tasmota"

---
# Alternative: Subscribe to all Tasmota bridges with wildcards
apiVersion: mqtt.hauke.cloud/v1alpha1
kind: MQTTBridge
metadata:
  name: tasmota-all-bridges
  namespace: default
spec:
  host: "mqtt.local"
  port: 1883
  credentialsSecretRef:
    name: mqtt-credentials
  
  deviceType: "tasmota"
  # No bridgeName specified - subscribes to all
  
  stateTopics:
    # All status from all Tasmota bridges
    - topic: "stat/+/RESULT"
      type: "status"
    # All state from all Tasmota bridges
    - topic: "tele/+/STATE"
      type: "state"
  
  sensorTopics:
    # All telemetry from all Tasmota bridges
    - topic: "tele/+/SENSOR"
      type: "telemetry"
  
  discoveryEnabled: true

---
# Legacy example using deprecated 'topics' field (still supported)
apiVersion: mqtt.hauke.cloud/v1alpha1
kind: MQTTBridge
metadata:
  name: tasmota-legacy
  namespace: default
spec:
  host: "mqtt.local"
  port: 1883
  credentialsSecretRef:
    name: mqtt-credentials
  
  deviceType: "tasmota"
  bridgeName: "tasmota_bridge_1"
  
  # Deprecated: Use stateTopics and sensorTopics instead
  topics:
    - topic: "tele/tasmota_bridge_1/SENSOR"
      type: "telemetry"
    - topic: "stat/tasmota_bridge_1/RESULT"
      type: "status"
    - topic: "tele/tasmota_bridge_1/STATE"
      type: "state"

---
# Example: Zigbee2MQTT for comparison (simple single topic)
apiVersion: mqtt.hauke.cloud/v1alpha1
kind: MQTTBridge
metadata:
  name: zigbee2mqtt-bridge
  namespace: default
spec:
  host: "mqtt.local"
  port: 1883
  credentialsSecretRef:
    name: mqtt-credentials
  
  deviceType: "zigbee2mqtt"
  topicPrefix: "zigbee2mqtt"  # Simple prefix mode
  discoveryEnabled: true

---

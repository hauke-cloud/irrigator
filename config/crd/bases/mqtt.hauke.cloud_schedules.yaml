---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: schedules.mqtt.hauke.cloud
spec:
  group: mqtt.hauke.cloud
  names:
    kind: Schedule
    listKind: ScheduleList
    plural: schedules
    shortNames:
    - sched
    singular: schedule
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.resolvedDeviceName
      name: Device
      priority: 1
      type: string
    - jsonPath: .spec.cronExpression
      name: Cron
      type: string
    - jsonPath: .spec.durationSeconds
      name: Duration
      type: integer
    - jsonPath: .spec.enabled
      name: Enabled
      type: boolean
    - jsonPath: .status.active
      name: Active
      type: boolean
    - jsonPath: .status.lastExecutionTimeFormatted
      name: Last Run
      type: string
    - jsonPath: .status.nextScheduledTimeFormatted
      name: Next Run
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Schedule is the Schema for the schedules API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ScheduleSpec defines the desired state of Schedule
            properties:
              cronExpression:
                description: |-
                  CronExpression defines when the irrigation should run
                  Standard cron format: "minute hour day month weekday"
                  Examples:
                    "0 6 * * *" - Every day at 6:00 AM
                    "0 18 * * 1,3,5" - Monday, Wednesday, Friday at 6:00 PM
                    "*/30 * * * *" - Every 30 minutes
                minLength: 1
                type: string
              deviceFriendlyName:
                description: |-
                  DeviceFriendlyName is the friendly name of the device to control
                  Alternative to DeviceName - will look up device by spec.friendlyName
                type: string
              deviceIEEEAddr:
                description: |-
                  DeviceIEEEAddr is the IEEE address of the device to control
                  Alternative to DeviceName - will look up device by spec.ieeeAddr
                type: string
              deviceName:
                description: |-
                  DeviceName is the name of the Device CR to control
                  The device must have sensorType "valve" to be used for irrigation
                type: string
              deviceShortAddr:
                description: |-
                  DeviceShortAddr is the short Zigbee address of the device to control
                  Alternative to DeviceName - will look up device by status.shortAddr
                type: string
              dryRun:
                default: false
                description: |-
                  DryRun enables dry-run mode where execution plans are logged but no MQTT commands are sent
                  Useful for testing schedules without actually controlling valves
                type: boolean
              durationSeconds:
                description: DurationSeconds defines how long the valve should remain
                  open (in seconds)
                format: int32
                maximum: 86400
                minimum: 1
                type: integer
              enabled:
                default: true
                description: Enabled indicates whether this schedule is active
                type: boolean
              executionConditions:
                description: |-
                  ExecutionConditions are conditions that must be met before executing the schedule
                  All conditions must pass for the schedule to execute
                  Example: Check that all water_level sensors are not alerting
                items:
                  description: ExecutionCondition defines a condition that must be
                    met before executing a schedule
                  properties:
                    alert:
                      description: |-
                        Alert indicates whether to check for alert status on matching devices
                        If true, condition passes only if no matching devices have an alert
                        If false, condition passes only if all matching devices have an alert
                        Cannot be used together with Measurement
                      type: boolean
                    measurement:
                      description: |-
                        Measurement is the name of the measurement field to check in device telemetry
                        Example fields: "temperature", "humidity", "battery", "moisture"
                        Cannot be used together with Alert
                      type: string
                    message:
                      description: Message is a custom message to include in status
                        when this condition fails
                      type: string
                    operator:
                      description: |-
                        Operator defines how to compare the measurement value
                        Required when Measurement is specified
                      enum:
                      - eq
                      - ne
                      - gt
                      - ge
                      - lt
                      - le
                      type: string
                    sensorType:
                      description: |-
                        SensorType is the type of sensor to check (e.g., "water_level", "moisture", "temperature")
                        This matches the Device.Spec.SensorType field
                      minLength: 1
                      type: string
                    value:
                      description: |-
                        Value is the value to compare against
                        Can be a number (e.g., "25.5") or boolean (e.g., "true")
                        Required when Measurement is specified
                      type: string
                  required:
                  - sensorType
                  type: object
                type: array
              timeZone:
                default: UTC
                description: |-
                  TimeZone for the cron schedule (e.g., "Europe/Berlin", "UTC")
                  If not specified, uses UTC
                type: string
            required:
            - cronExpression
            - durationSeconds
            type: object
          status:
            description: ScheduleStatus defines the observed state of Schedule
            properties:
              active:
                description: Active indicates if irrigation is currently running
                type: boolean
              conditions:
                description: Conditions represent the latest available observations
                  of the schedule's state
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              conditionsLastChecked:
                description: ConditionsLastChecked is when execution conditions were
                  last evaluated
                format: date-time
                type: string
              conditionsMessage:
                description: ConditionsMessage provides details about condition evaluation
                type: string
              conditionsPassed:
                description: ConditionsPassed indicates whether all execution conditions
                  passed on last check
                type: boolean
              lastCompletionTime:
                description: LastCompletionTime is when the irrigation finished
                format: date-time
                type: string
              lastExecutionTime:
                description: LastExecutionTime is when the irrigation actually started
                format: date-time
                type: string
              lastExecutionTimeFormatted:
                description: |-
                  LastExecutionTimeFormatted is the last execution time formatted in the configured timezone
                  This is a human-readable string for display purposes
                type: string
              lastScheduledTime:
                description: LastScheduledTime is when the irrigation was last scheduled
                  to run
                format: date-time
                type: string
              lastStatus:
                description: LastStatus describes the result of the last execution
                type: string
              message:
                description: Message provides additional information about the current
                  state
                type: string
              nextScheduledTime:
                description: NextScheduledTime is when the irrigation is next scheduled
                  to run
                format: date-time
                type: string
              nextScheduledTimeFormatted:
                description: |-
                  NextScheduledTimeFormatted is the next scheduled time formatted in the configured timezone
                  This is a human-readable string for display purposes
                type: string
              resolvedDeviceName:
                description: |-
                  ResolvedDeviceName is the name of the Device CR that was found
                  This shows which device is actually being controlled
                type: string
              valvePowerState:
                description: |-
                  ValvePowerState indicates the last known power state from telemetry
                  0 = OFF, 1 = ON, nil = unknown
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
